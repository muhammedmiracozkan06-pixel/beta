<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Web | Wind Developers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.98); display: flex; 
            justify-content: center; align-items: center; z-index: 10000;
        }
        .auth-card {
            background: #1e1e1e; padding: 40px; border-radius: 20px;
            text-align: center; border: 1px solid #333; width: 320px; color: white;
        }
        .wind-login-btn {
            display: block; width: 100%; padding: 12px; background: #000; 
            color: #fff; border: 1px solid #444; border-radius: 5px; 
            text-decoration: none; font-weight: bold; margin-top: 15px;
        }
        #user-info { display: flex; align-items: center; background: #252525; padding: 5px 12px; border-radius: 30px; }
        #user-pic { width: 28px; height: 28px; border-radius: 50%; margin-left: 8px; }
        .limit-info { font-size: 10px; color: #888; margin-top: 5px; text-align: right; }
        
        #image-preview-container {
            display: none; width: 100%; padding: 10px; background: #252525;
            border-bottom: 1px solid #333; align-items: center; justify-content: space-between;
        }
        #preview-img { height: 45px; border-radius: 4px; border: 1px solid #444; }
        .remove-img { color: #ff4d4d; cursor: pointer; font-size: 12px; font-weight: bold; padding: 5px; }

        .input-area { padding: 15px; background: #151515; display: flex; flex-direction: column; }
        .modern-bar {
            display: flex; align-items: center; background: #252525; 
            border: 1px solid #333; border-radius: 30px; padding: 5px 15px; 
            transition: 0.3s ease;
        }
        .modern-bar:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }
        #user-input {
            flex: 1; background: transparent; border: none; color: white; 
            padding: 10px; outline: none; font-size: 15px;
        }
    </style>
</head>
<body>
    <!-- Wind Services Auth Layer -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Welcome to Pilot AI</h2>
            <p>Please sign in with your Wind account to continue</p>
            <a href="https://wmswmail.vercel.app?redirect=https://pilotwebai.vercel.app" class="wind-login-btn">
                Login with Wind Services
            </a>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo" style="color: #4ade80;">Pilot AI</div>
            <div id="user-info">
                <span id="user-name">Guest</span>
                <img id="user-pic" src="https://ui-avatars.com/api/?name=User" alt="Profile">
            </div>
            <select id="model-select">
                <option value="openai/gpt-oss-120b">Pilot 6 Pro</option>
                <option value="qwen/qwen3-32b">Qwen</option>
                <option value="moonshotai/kimi-k2-instruct-0905">Kimi K2</option>
                <option value="openai/gpt-oss-20b">Pilot 5</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct">Pilot Lite</option>
                <option value="llama-3.3-70b-versatile">LLAMA 3</option>
                <option value="openai/gpt-oss-safeguard-20b">Pilot Security</option>
            </select>
        </header>

        <div id="chat-window">
            <div class="ai-msg">Hello! Pilot AI is ready. How can I assist you today? ✨</div>
        </div>

        <div class="input-area">
            <div id="image-preview-container">
                <img id="preview-img" src="" alt="Preview">
                <span class="remove-img" id="remove-img-btn">Cancel</span>
            </div>

            <div class="modern-bar">
                <input type="file" id="image-input" accept="image/*" style="display:none;">
                <button id="upload-btn" title="Image Analysis" style="background:none; border:none; font-size:22px; cursor:pointer; color:#aaa; margin-right:10px;">📎</button>
                
                <!-- Updated placeholder for image generation -->
                <input type="text" id="user-input" placeholder="Type a message or 'imagine' to draw...">
                
                <button id="send-btn" style="background: #3b82f6; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">🚀</button>
            </div>
            <div id="limit-display" class="limit-info">Daily Usage: 0 / 30</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
